name: Deploy MoonTV to SAP Cloud Foundry

on:
  workflow_dispatch:
    inputs:
      region:
        description: "选择部署区域"
        required: true
        default: "SG(free)"
        type: choice
        options:
          - 'SG(free)'
          - 'US(free)'
          - 'AWS-AU(Sydney)'
          - 'AWS-BR(São Paulo)'
          - 'AWS-KR(Seoul)'
          - 'AWS-CA(Montreal)'
          - 'AWS-US(VA)'
          - 'AWS-US(OR)'
          - 'AWS-EU(Frankfurt)'
          - 'AWS-JP(Tokyo)'
          - 'AWS-SG(Singapore)'
          - 'GCP-AU(Sydney)'
          - 'GCP-BR(São Paulo)'
          - 'GCP-US(IA)'
          - 'GCP-EU(Frankfurt)'
          - 'GCP-JP(Osaka)'
          - 'GCP-JP(Tokyo)'
          - 'GCP-IL(Tel Aviv)'
          - 'GCP-IN(Mumbai)'
          - 'GCP-KSA(Dammam)'
          - 'Azure-AU(Sydney)'
          - 'Azure-BR(São Paulo)'
          - 'Azure-CA(Montreal)'
          - 'Azure-US(VA)'
          - 'Azure-US(WA)'
          - 'Azure-EU(Netherlands)'
          - 'Azure-JP(Tokyo)'
          - 'Azure-SG(Singapore)'
          - 'Neo-UAE(Dubai)'
          - 'Neo-KSA(Riyadh)'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set API endpoint and APP name
        run: |
          RANDOM_STR=$(head /dev/urandom | tr -dc 'a-z' | head -c 6)
          CF_API_URL=""
          APP_NAME_PREFIX=""

          case "${{ github.event.inputs.region }}" in
            "SG(free)")              CF_API_URL="https://api.cf.ap21.hana.ondemand.com"; APP_NAME_PREFIX="moontv-freesg" ;;
            "US(free)")              CF_API_URL="https://api.cf.us10-001.hana.ondemand.com"; APP_NAME_PREFIX="moontv-freeus" ;;
            "AWS-AU(Sydney)")        CF_API_URL="https://api.cf.ap10.hana.ondemand.com"; APP_NAME_PREFIX="moontv-awsau" ;;
            "AWS-BR(São Paulo)")     CF_API_URL="https://api.cf.br10.hana.ondemand.com"; APP_NAME_PREFIX="moontv-awsbr" ;;
            "AWS-KR(Seoul)")         CF_API_URL="https://api.cf.ap12.hana.ondemand.com"; APP_NAME_PREFIX="moontv-awskr" ;;
            "AWS-CA(Montreal)")      CF_API_URL="https://api.cf.ca10.hana.ondemand.com"; APP_NAME_PREFIX="moontv-awsca" ;;
            "AWS-US(VA)")            CF_API_URL="https://api.cf.us10-001.hana.ondemand.com"; APP_NAME_PREFIX="moontv-awsusva" ;;
            "AWS-US(OR)")            CF_API_URL="https://api.cf.us11.hana.ondemand.com"; APP_NAME_PREFIX="moontv-awsusor" ;;
            "AWS-EU(Frankfurt)")     CF_API_URL="https://api.cf.eu10-005.hana.ondemand.com"; APP_NAME_PREFIX="moontv-waseu" ;;
            "AWS-JP(Tokyo)")         CF_API_URL="https://api.cf.jp10.hana.ondemand.com"; APP_NAME_PREFIX="moontv-awsjp" ;;
            "AWS-SG(Singapore)")     CF_API_URL="https://api.cf.ap11.hana.ondemand.com"; APP_NAME_PREFIX="moontv-awssg" ;;
            "GCP-AU(Sydney)")        CF_API_URL="https://api.cf.ap30.hana.ondemand.com"; APP_NAME_PREFIX="moontv-gcpau" ;;
            "GCP-BR(São Paulo)")     CF_API_URL="https://api.cf.br30.hana.ondemand.com"; APP_NAME_PREFIX="moontv-gcpbr" ;;
            "GCP-US(IA)")            CF_API_URL="https://api.cf.us30.hana.ondemand.com"; APP_NAME_PREFIX="moontv-gcpus" ;;
            "GCP-EU(Frankfurt)")     CF_API_URL="https://api.cf.eu30.hana.ondemand.com"; APP_NAME_PREFIX="moontv-gcpeu" ;;
            "GCP-JP(Osaka)")         CF_API_URL="https://api.cf.jp30.hana.ondemand.com"; APP_NAME_PREFIX="moontv-gcpjpo" ;;
            "GCP-JP(Tokyo)")         CF_API_URL="https://api.cf.jp31.hana.ondemand.com"; APP_NAME_PREFIX="moontv-gcpjpt" ;;
            "GCP-IL(Tel Aviv)")      CF_API_URL="https://api.cf.il30.hana.ondemand.com"; APP_NAME_PREFIX="moontv-gcpil" ;;
            "GCP-IN(Mumbai)")        CF_API_URL="https://api.cf.in30.hana.ondemand.com"; APP_NAME_PREFIX="moontv-gcpin" ;;
            "GCP-KSA(Dammam)")       CF_API_URL="https://api.cf.sa31.hana.ondemand.com"; APP_NAME_PREFIX="moontv-gcpsa" ;;
            "Azure-AU(Sydney)")      CF_API_URL="https://api.cf.ap20.hana.ondemand.com"; APP_NAME_PREFIX="moontv-azau" ;;
            "Azure-BR(São Paulo)")   CF_API_URL="https://api.cf.br20.hana.ondemand.com"; APP_NAME_PREFIX="moontv-azbr" ;;
            "Azure-CA(Montreal)")    CF_API_URL="https://api.cf.ca20.hana.ondemand.com"; APP_NAME_PREFIX="moontv-azca" ;;
            "Azure-US(VA)")          CF_API_URL="https://api.cf.us21.hana.ondemand.com"; APP_NAME_PREFIX="moontv-azva" ;;
            "Azure-US(WA)")          CF_API_URL="https://api.cf.us20.hana.ondemand.com"; APP_NAME_PREFIX="moontv-azwa" ;;
            "Azure-EU(Netherlands)") CF_API_URL="https://api.cf.eu20-001.hana.ondemand.com"; APP_NAME_PREFIX="moontv-azeu" ;;
            "Azure-JP(Tokyo)")       CF_API_URL="https://api.cf.jp20.hana.ondemand.com"; APP_NAME_PREFIX="moontv-azjp" ;;
            "Azure-SG(Singapore)")   CF_API_URL="https://api.cf.ap21.hana.ondemand.com"; APP_NAME_PREFIX="moontv-azsg" ;;
            "Neo-UAE(Dubai)")        CF_API_URL="https://api.cf.neo-ae1.hana.ondemand.com"; APP_NAME_PREFIX="moontv-neouae" ;;
            "Neo-KSA(Riyadh)")       CF_API_URL="https://api.cf.neo-sa1.hana.ondemand.com"; APP_NAME_PREFIX="moontv-neoksa" ;;
          esac

          echo "CF_API=$CF_API_URL" >> $GITHUB_ENV
          echo "APP_NAME=$APP_NAME_PREFIX$RANDOM_STR" >> $GITHUB_ENV

      - name: Install CF CLI
        run: |
          wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key | sudo apt-key add -
          echo "deb https://packages.cloudfoundry.org/debian stable main" | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
          sudo apt-get update
          sudo apt-get install cf8-cli -y

      - name: Login to Cloud Foundry
        run: |
          cf api ${{ env.CF_API }}
          cf auth "${{ secrets.CF_USER }}" "${{ secrets.CF_PASSWORD }}"
          cf target -o "${{ secrets.CF_ORG }}" -s "${{ secrets.CF_SPACE }}"

      - name: Push app to Cloud Foundry
        run: |
          export CF_DOCKER_PASSWORD=${{ secrets.GITHUB_TOKEN }}
          cf push ${{ env.APP_NAME }} --docker-image ghcr.io/eaglehhha/lunatv:latest --docker-username ${{ github.actor }} --no-start

      - name: Configure Redis env
        run: |
          cf set-env ${{ env.APP_NAME }} NEXT_PUBLIC_STORAGE_TYPE "redis"
          cf set-env ${{ env.APP_NAME }} UPSTASH_REDIS_URL "${{ secrets.UPSTASH_REDIS_URL }}"
          cf restage ${{ env.APP_NAME }}
