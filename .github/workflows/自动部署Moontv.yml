name: Automatic deployment of moontv to SAP
on:
  workflow_dispatch:  # Only allow manual trigger
    inputs:
      type:
        description: 'Select the version to deploy'
        required: true
        default: 'Moontv'
        type: choice
        options:
          - Lunatv
          - Moontv
          - KatelyaTV
      region:
        description: 'Select deployment region'
        required: true
        default: 'US(free)'
        type: choice
        options:
          - SG(free)  # Azure Singapore
          - US(free)  # AWS US
          - AWS-AU(Sydney)
          - AWS-BR(São Paulo)
          - AWS-KR(Seoul)
          - AWS-CA(Montreal)
          - AWS-US (Virginia)
          - AWS-US(OR)
          - AWS-EU(Frankfurt)
          - AWS-JP(Tokyo)
          - AWS-SG(Singapore)
          - GCP-AU(Sydney)
          - GCP-BR(São Paulo)
          - GCP-US(IA)
          - GCP-EU(Frankfurt)
          - GCP-JP(Osaka)
          - GCP-JP(Tokyo)
          - GCP-IL(Tel Aviv)
          - GCP-IN(Mumbai)
          - GCP-KSA(Dammam)
          - Azure-AU(Sydney)
          - Azure-BR(São Paulo)
          - Azure-CA(Montreal)
          - Azure-US(VA)
          - Azure-US(WA)
          - Azure-EU(Netherlands)
          - Azure-JP(Tokyo)
          - Azure-SG(Singapore)
          - Neo-UAE(Dubai)
          - Neo-KSA(Riyadh)
      app_name:
        description: 'Application name (optional, leave blank to auto-generate)'
        required: false
        default: ''

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_IMAGE || 'ghcr.io/eooce/moontv:latest' }}
  MEMORY: ${{ secrets.MEMORY || '512M' }}
  DISK: ${{ secrets.DISK || '512M' }}

jobs:
  deploy-app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install CF CLI
        run: |
          wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key | sudo apt-key add -
          echo "deb https://packages.cloudfoundry.org/debian stable main" | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
          sudo apt-get update
          sudo apt-get install -y cf8-cli

      - name: Determine CF API endpoint and app name
        run: |
          RANDOM_STR=$(head /dev/urandom | tr -dc 'a-z' | head -c 6)
          case "${{ github.event.inputs.region }}" in
            "SG(free)") echo "CF_API=https://api.cf.ap21.hana.ondemand.com" >> $GITHUB_ENV
                        echo "APP_NAME=moontv-freesg$RANDOM_STR" >> $GITHUB_ENV
                        ;;
            "US(free)") echo "CF_API=https://api.cf.us10-001.hana.ondemand.com" >> $GITHUB_ENV
                        echo "APP_NAME=moontv-freeus$RANDOM_STR" >> $GITHUB_ENV
                        ;;
            # Add more regions here...
          esac

          # If the user provided an application name, use the user-provided one
          if [ -n "${{ github.event.inputs.app_name }}" ]; then
            echo "APP_NAME=${{ github.event.inputs.app_name }}" >> $GITHUB_ENV
          fi

          echo "Using API endpoint: $CF_API"
          echo "Application name: $APP_NAME"

      - name: Set Upstash database env
        run: |
          cf set-env ${{ env.APP_NAME }} NEXT_PUBLIC_STORAGE_TYPE "upstash"
          cf set-env ${{ env.APP_NAME }} KVROCKS_URL "${{ secrets.KVROCKS_URL }}"
          cf restage ${{ env.APP_NAME }}

      - name: Login to Cloud Foundry
        run: |
          cf login -a ${{ env.CF_API }} -u "${{ secrets.EMAIL }}" -p "${{ secrets.PASSWORD }}"
          
          # Get organization list
          ORG=$(cf orgs | sed -n '4p')
          echo "Selected org: $ORG"
          echo "ORG=$ORG" >> $GITHUB_ENV

          # Get list of spaces
          SPACE=$(cf spaces | sed -n '4p')
          echo "Selected space: $SPACE"
          echo "SPACE=$SPACE" >> $GITHUB_ENV

          # Re-login using the retrieved organization and space
          cf login -a ${{ env.CF_API }} -u "${{ secrets.EMAIL }}" -p "${{ secrets.PASSWORD }}" -o "$ORG" -s "$SPACE"

      - name: Deploy application
        run: |
          if cf push ${{ env.APP_NAME }} --docker-image ${{ env.DOCKER_IMAGE }} -m ${{ env.MEMORY }} -k ${{ env.DISK }} --health-check-type port; then
            echo "Deployment successful"
          else
            cf delete ${{ env.APP_NAME }} -f -r
            echo "Deployment failed, cleaning up remnants. Please try deploying again between 8:20 AM and 9:00 AM."
            exit 1
          fi

      - name: Verify deployment
        run: |
          cf set-env ${{ env.APP_NAME }} PASSWORD ${{ secrets.TV_PASSWORD || '123456'}}
          cf restage ${{ env.APP_NAME }}
          STATUS=$(cf app ${{ env.APP_NAME }} | grep "requested state:" | awk '{print $3}')
          if [ "$STATUS" = "started" ]; then
            echo "✅ Moontv started successfully"
          else
            echo "❌ Application failed to start, current status: $STATUS"
            cf logs ${{ env.APP_NAME }} --recent
            exit 1
          fi

      - name: Detailed Deployment Information
        run: |
          echo "🚀 Deployment completed! Detailed information as follows:"
          echo "Region: ${{ github.event.inputs.region }}"
          echo "Organization (ORG): ${{ env.ORG }}"
          echo "Space (SPACE): ${{ env.SPACE }}"
          echo "Application Name (App Name): ${{ env.APP_NAME }}"

          ROUTE=$(cf app ${{ env.APP_NAME }} | grep "routes:" | awk '{print $2}')
          if [ -n "$ROUTE" ]; then
            echo "Moontv—URL: https://$ROUTE"
          else
            echo "⚠️ Application route not found, please check deployment status."
          fi
